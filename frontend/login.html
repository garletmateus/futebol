<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Área do Lojista | Resenha Sports</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800&family=DM+Sans:wght@400;500;700&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #0d7a5f;
      --primary-dark: #085542;
      --accent: #f3b03d;
      --ink: #11211b
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "DM Sans", sans-serif;
      background: linear-gradient(135deg, rgba(8, 18, 15, .88), rgba(13, 122, 95, .82)), url("./image/banner-brasileirao.webp") center/cover no-repeat
    }

    .card-login {
      width: min(100%, 460px);
      border: none;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 24px 50px rgba(0, 0, 0, .25)
    }

    .brand-mark {
      width: 46px;
      height: 46px;
      border-radius: 15px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--accent), #ffd978);
      font-weight: 800;
      color: #111;
      font-family: "Barlow", sans-serif
    }

    .btn-primary {
      background: var(--primary);
      border-color: var(--primary)
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      border-color: var(--primary-dark)
    }
  </style>
</head>

<body>
  <div class="card card-login">
    <div class="card-body p-4 p-md-5 bg-white">
      <div class="d-flex align-items-center gap-3 mb-4">
        <div class="brand-mark">RS</div>
        <div>
          <h1 class="h3 mb-0" style="font-family:'Barlow',sans-serif;color:var(--ink)">Área do lojista</h1>
          <p class="text-secondary mb-0">Acesso restrito ao painel administrativo</p>
        </div>
      </div>
      <form id="loginForm">
        <div class="mb-3"><label class="form-label fw-semibold">E-mail</label><input id="email" type="email"
            class="form-control form-control-lg" placeholder="admin@resenhasports.com" required></div>
        <div class="mb-3"><label class="form-label fw-semibold">Senha</label><input id="senha" type="password"
            class="form-control form-control-lg" placeholder="Digite sua senha" required></div>
        <div class="alert alert-danger d-none" id="erroLogin">Credenciais inválidas. Tente novamente.</div>
        <button class="btn btn-primary w-100" type="submit">Entrar no painel</button>
      </form>
      <div class="mt-4 small text-secondary">Acesso padrão: <strong></strong> <strong></strong>.</div>
      <div class="mt-3"><a href="index.html" class="text-decoration-none">Voltar para a loja</a></div>
    </div>
  </div>
  <script>
    const ADMIN_EMAIL = "admin@resenhasports.com";
    const ADMIN_PASSWORD = "admin123";
    document.getElementById("loginForm").addEventListener("submit", function (e) {
      e.preventDefault();
      const email = document.getElementById("email").value.trim().toLowerCase();
      const senha = document.getElementById("senha").value;
      if (email === ADMIN_EMAIL && senha === ADMIN_PASSWORD) {
        sessionStorage.setItem("resenha_admin_auth", "ok");
        window.location.href = "admin.html";
        return;
      }
      document.getElementById("erroLogin").classList.remove("d-none");
    });
  </script>
</body>

</html>
