<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resenha Sports</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/index.css">
  
  <style>
    /* ==========================================================================
       SELETOR DE TAMANHOS (MODO ESCURO - PADRÃO)
       ========================================================================== */
    .product-body select, #modalProduto .form-select {
      appearance: none !important;
      -webkit-appearance: none !important;
      -moz-appearance: none !important;
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='%23ffffff'%3e%3cpath fill-rule='evenodd' d='M1.646 4.646a.5.5 0 0 1 .708 0L8 10.293l5.646-5.647a.5.5 0 0 1 .708.708l-6 6a.5.5 0 0 1-.708 0l-6-6a.5.5 0 0 1 0-.708z'/%3e%3c/svg%3e") !important;
      background-repeat: no-repeat !important;
      background-position: right 14px center !important;
      background-size: 12px !important;
      padding-right: 35px !important;
    }

    /* ==========================================================================
       SELETOR DE TAMANHOS (MODO CLARO) - BRANCO E LEVEMENTE TRANSPARENTE
       ========================================================================== */
    .light-mode .product-body select, 
    .light-mode #modalProduto .form-select {
      background-color: rgba(255, 255, 255, 0.65) !important;
      backdrop-filter: blur(4px) !important;
      color: #111111 !important;
      border: 1px solid rgba(0, 0, 0, 0.2) !important;
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='%23111111'%3e%3cpath fill-rule='evenodd' d='M1.646 4.646a.5.5 0 0 1 .708 0L8 10.293l5.646-5.647a.5.5 0 0 1 .708.708l-6 6a.5.5 0 0 1-.708 0l-6-6a.5.5 0 0 1 0-.708z'/%3e%3c/svg%3e") !important;
    }

    .light-mode .product-body select option,
    .light-mode #modalProduto .form-select option {
      background-color: #ffffff !important;
      color: #111111 !important;
    }
  </style>
</head>

<body>
  <header>
    <div class="topbar">
      <div class="container page-shell">
        <div class="topbar-main">
          <div class="brand-block">
            <div class="crest">
              <div class="crest-inner"></div>
            </div>
            <div class="brand-copy text-white"><strong>RESENHA</strong><span>SPORTS</span></div>
          </div>
          <button class="mobile-menu-toggle" type="button" data-bs-toggle="collapse" data-bs-target="#mainMenu" aria-controls="mainMenu" aria-expanded="false" aria-label="Abrir menu"><span></span></button>
          <div class="search-box">
            <input type="text" id="buscarTopo" placeholder="O que você está buscando?">
            <button type="button" aria-label="Buscar">⌕</button>
          </div>
          
          <div class="top-actions">
            <button id="theme-toggle" class="btn">🌙</button>

            <a class="action-link" href="login.html">
              <span class="icon">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"></circle><path d="M4 20c1.8-4 5-6 8-6s6.2 2 8 6"></path></svg>
              </span>
              <span>Minha conta</span>
            </a>
            
            <button class="action-link cart-pill p-0 border-0 bg-transparent" data-bs-toggle="modal" data-bs-target="#cartModal">
              <span class="icon">
                <svg viewBox="0 0 24 24"><circle cx="9" cy="20" r="1.5"></circle><circle cx="18" cy="20" r="1.5"></circle><path d="M3 4h2l2.2 10.2a1 1 0 0 0 1 .8h9.9a1 1 0 0 0 1-.8L21 7H7"></path></svg>
              </span>
              <span>Meu carrinho</span>
              <span id="cart-count" class="cart-count">0</span>
            </button>
          </div>
        </div>
      </div>
    </div>
    
    <div class="navline">
      <div class="container page-shell">
        <nav class="navbar navbar-expand-lg navbar-custom px-0">
          <div class="collapse navbar-collapse" id="mainMenu">
            <div class="nav-menu navbar-nav mx-auto w-100 justify-content-center">
              <a class="nav-link" href="#">Início</a>
              <a class="nav-link" href="#" data-nav-category="Brasileirao">Brasileirão</a>
              <a class="nav-link" href="#" data-nav-category="Selecoes">Seleções</a>
              <a class="nav-link" href="#" data-nav-category="Europa">Europa</a>
              <a class="nav-link" href="login.html">Contato</a>
            </div>
          </div>
        </nav>
      </div>
    </div>
  </header>

  <div id="carouselExampleAutoplaying" class="carousel slide" data-bs-ride="carousel">
    <div class="carousel-inner">
      <div class="carousel-item active">
        <img src="image/telaresenha 02.webp" class="d-block w-100" alt="Banner 1">
      </div>
      <div class="carousel-item">
        <img src="image/telaresenha 03.webp" class="d-block w-100" alt="Banner 2">
      </div>
      <div class="carousel-item">
        <img src="image/banner-brasileirao.webp" class="d-block w-100" alt="Banner 3">
      </div>
    </div>
    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleAutoplaying" data-bs-slide="prev">
      <span class="carousel-control-prev-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Previous</span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleAutoplaying" data-bs-slide="next">
      <span class="carousel-control-next-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Next</span>
    </button>
  </div>

  <main class="container page-shell catalog-shell">
    <section class="surface-card filters-card">
      <div class="catalog-head">
        <div>
          <p>Vitrine principal</p>
          <h2>Camisas em destaque</h2>
        </div>
      </div>
      <div class="filters-row">
        <input type="text" id="buscar" placeholder="Buscar por time, descrição ou categoria...">
        <select id="categoriaSelect">
          <option value="Todos">Todas as categorias</option>
        </select>
        <select id="ordenar">
          <option value="relevancia">Ordenar por relevância</option>
          <option value="menor-preco">Menor preço</option>
          <option value="maior-preco">Maior preço</option>
          <option value="nome">Nome A-Z</option>
        </select>
      </div>
      <div id="categorias" class="chip-group"></div>
    </section>
    <section id="lista-produtos" class="product-grid"></section>
  </main>

  <div class="modal fade" id="modalProduto" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">
        <div class="modal-header bg-dark text-white">
          <div>
            <h5 id="mTitulo" class="mb-0"></h5><small id="mCategoria" class="text-white-50"></small>
          </div><button class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <div class="modal-body p-4">
          <div class="row g-4 align-items-center">
            <div class="col-md-6"><img id="mImg" class="w-100 rounded-4" alt="Produto selecionado"></div>
            <div class="col-md-6">
              <p id="mDesc" class="text-secondary"></p>
              <h4 class="text-success fw-bold mb-3">R$ <span id="mPreco"></span></h4><label for="mTamanho" class="form-label fw-semibold">Escolha o tamanho</label><select id="mTamanho" class="form-select mb-3"></select><button id="mAdd" class="btn btn-success w-100">Adicionar ao carrinho</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="cartModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">
        <div class="modal-header bg-dark text-white">
          <h5 class="mb-0">Seu carrinho</h5><button class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <div class="modal-body p-4">
          <div id="cart-items"></div>
          <div class="summary-bar">
            <div>
              <div class="text-secondary">Total da compra</div><strong class="fs-4">R$ <span id="cart-total">0,00</span></strong>
            </div><button class="btn btn-success" onclick="abrirPagamento()">Finalizar compra</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="modalPagamento" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">
        <div class="modal-header bg-success text-white">
          <h5 class="mb-0">Finalizar compra</h5><button class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <div class="modal-body p-4">
          <div class="row g-3">
            <div class="col-md-6"><label for="checkoutNome" class="form-label fw-semibold">Nome completo</label><input id="checkoutNome" class="form-control" placeholder="Seu nome"></div>
            <div class="col-md-6"><label for="checkoutTelefone" class="form-label fw-semibold">Telefone</label><input id="checkoutTelefone" class="form-control" placeholder="(00) 00000-0000"></div>
            <div class="col-md-4"><label for="checkoutCep" class="form-label fw-semibold">CEP</label><input id="checkoutCep" class="form-control" placeholder="00000-000"></div>
            <div class="col-md-8"><label for="checkoutRua" class="form-label fw-semibold">Rua / Avenida</label><input id="checkoutRua" class="form-control" placeholder="Digite seu endereço"></div>
            <div class="col-md-4"><label for="checkoutNumero" class="form-label fw-semibold">Número</label><input id="checkoutNumero" class="form-control" placeholder="123"></div>
            <div class="col-md-4"><label for="checkoutBairro" class="form-label fw-semibold">Bairro</label><input id="checkoutBairro" class="form-control" placeholder="Seu bairro"></div>
            <div class="col-md-4"><label for="checkoutCidade" class="form-label fw-semibold">Cidade</label><input id="checkoutCidade" class="form-control" placeholder="Sua cidade"></div>
            <div class="col-12"><label for="checkoutComplemento" class="form-label fw-semibold">Complemento</label><input id="checkoutComplemento" class="form-control" placeholder="Apartamento, bloco, referência..."></div>
            <div class="col-md-6"><label for="metodoPagamento" class="form-label fw-semibold">Método de pagamento</label><select id="metodoPagamento" class="form-select">
                <option value="Pix">Pix</option>
                <option value="Cartão">Cartão</option>
                <option value="Boleto">Boleto</option>
              </select></div>
            <div class="col-md-6 d-flex align-items-end"><button class="btn btn-success w-100" onclick="confirmarPagamento()">Confirmar pedido</button></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toastAviso" class="toast align-items-center bg-success text-white border-0 position-fixed bottom-0 end-0 m-3" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="d-flex">
      <div class="toast-body" id="toastMensagem">Parabéns, seu produto foi adicionado ao carrinho.</div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Fechar"></button>
    </div>
  </div>

  <footer class="footer">© <span id="ano2"></span> Resenha Sports • <a href="login.html">Área do lojista</a></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./js/index.js"></script>

  <script>
    const themeButton = document.getElementById('theme-toggle');
    const htmlElement = document.documentElement;

    themeButton.onclick = function() {
      document.body.classList.toggle('light-mode');

      if (document.body.classList.contains('light-mode')) {
        htmlElement.setAttribute('data-bs-theme', 'light');
        themeButton.textContent = '☀️';
      } else {
        htmlElement.setAttribute('data-bs-theme', 'dark');
        themeButton.textContent = '🌙';
      }
    }
  </script>
</body>
</html>
