<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Administrativo | Resenha Sports</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
:root{--primary:#0d7a5f;--primary-dark:#085542;--ink:#11211b;--line:#d7e2dd}
body{background:#eef3f1;font-family:"DM Sans",sans-serif}
.shell{max-width:1240px}
.card{border:none;border-radius:24px;box-shadow:0 16px 34px rgba(17,33,27,.08)}
.thumb{width:64px;height:64px;border-radius:16px;object-fit:cover;background:#e8eeeb}
.btn-primary{background:var(--primary);border-color:var(--primary)}
.btn-primary:hover{background:var(--primary-dark);border-color:var(--primary-dark)}
.badge-soft{display:inline-flex;align-items:center;padding:.45rem .75rem;border-radius:999px;background:#eef7f3;color:#0d7a5f;font-weight:700}
</style>
</head>
<body>
<div class="container py-5 shell">
  <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
    <div>
      <p class="text-secondary mb-1">Área restrita</p>
      <h1 class="h2 mb-0" style="font-family:'Barlow',sans-serif;color:var(--ink)">Painel administrativo</h1>
    </div>
    <div class="d-flex gap-2">
      <a href="index.html" class="btn btn-outline-dark">Ver loja</a>
      <button id="logoutBtn" class="btn btn-dark">Sair</button>
    </div>
  </div>

  <div class="card p-4 mb-4">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
      <div>
        <h2 class="h4 mb-1">Produtos</h2>
        <p class="text-secondary mb-0">Cadastre, edite ou exclua os itens da vitrine.</p>
      </div>
      <span class="badge-soft">CRUD ativo</span>
    </div>
    <form id="produtoForm" class="row g-3">
      <input type="hidden" id="produtoId">
      <div class="col-md-6"><label class="form-label fw-semibold">Nome</label><input id="nome" class="form-control" required></div>
      <div class="col-md-3"><label class="form-label fw-semibold">Categoria</label><input id="categoria" class="form-control" required></div>
      <div class="col-md-3"><label class="form-label fw-semibold">Preço</label><input id="preco" type="number" step="0.01" class="form-control" required></div>
      <div class="col-12"><label class="form-label fw-semibold">Imagem</label><input id="img" class="form-control" placeholder="./image/corinthianss.webp" required></div>
      <div class="col-12"><label class="form-label fw-semibold">Descrição</label><textarea id="desc" class="form-control" rows="3" required></textarea></div>
      <div class="col-12"><label class="form-label fw-semibold">Tamanhos</label><input id="tamanhos" class="form-control" placeholder="P, M, G, GG" required></div>
      <div class="col-12 d-flex gap-2">
        <button class="btn btn-primary" type="submit">Salvar produto</button>
        <button class="btn btn-outline-secondary" type="button" id="cancelarBtn">Cancelar</button>
      </div>
    </form>
  </div>

  <div class="card p-4 mb-4">
    <div class="table-responsive">
      <table class="table align-middle mb-0">
        <thead>
          <tr>
            <th>Produto</th>
            <th>Categoria</th>
            <th>Preço</th>
            <th>Tamanhos</th>
            <th class="text-end">Ações</th>
          </tr>
        </thead>
        <tbody id="listaProdutos"></tbody>
      </table>
    </div>
  </div>

  <div class="card p-4">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
      <div>
        <h2 class="h4 mb-1">Pedidos recebidos</h2>
        <p class="text-secondary mb-0">Acompanhe pagamento e envio por aqui.</p>
      </div>
      <span class="badge-soft">Status de pedido</span>
    </div>
    <div class="table-responsive">
      <table class="table align-middle mb-0">
        <thead>
          <tr>
            <th>Pedido</th>
            <th>Cliente</th>
            <th>Pagamento</th>
            <th>Entrega</th>
            <th>Total</th>
            <th class="text-end">Atualizar</th>
          </tr>
        </thead>
        <tbody id="listaPedidos"></tbody>
      </table>
    </div>
  </div>
</div>
<script>
if(sessionStorage.getItem("resenha_admin_auth") !== "ok") { window.location.href = "login.html"; }

const PRODUTOS_API = "/api/produtos";
const PEDIDOS_API = "/api/pedidos";
const form = document.getElementById("produtoForm");
const listaProdutos = document.getElementById("listaProdutos");
const listaPedidos = document.getElementById("listaPedidos");
const cancelarBtn = document.getElementById("cancelarBtn");

function formatarPreco(valor) {
  return Number(valor).toLocaleString("pt-BR", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function formatarData(data) {
  return new Date(data).toLocaleString("pt-BR");
}

function limparProduto() {
  form.reset();
  document.getElementById("produtoId").value = "";
}

function coletarProduto() {
  return {
    nome: document.getElementById("nome").value.trim(),
    categoria: document.getElementById("categoria").value.trim(),
    preco: Number(document.getElementById("preco").value),
    img: document.getElementById("img").value.trim(),
    desc: document.getElementById("desc").value.trim(),
    tamanhos: document.getElementById("tamanhos").value.split(",").map((item) => item.trim()).filter(Boolean)
  };
}

async function carregarProdutos() {
  const resposta = await fetch(PRODUTOS_API);
  const produtos = await resposta.json();
  window.__produtos = produtos;

  listaProdutos.innerHTML = produtos.map((produto) => `
    <tr>
      <td>
        <div class="d-flex align-items-center gap-3">
          <img src="${produto.img}" class="thumb" alt="${produto.nome}">
          <div>
            <strong>${produto.nome}</strong><br>
            <span class="text-secondary small">${produto.desc}</span>
          </div>
        </div>
      </td>
      <td>${produto.categoria}</td>
      <td>R$ ${formatarPreco(produto.preco)}</td>
      <td>${produto.tamanhos.join(", ")}</td>
      <td class="text-end">
        <button class="btn btn-sm btn-outline-primary" onclick="editarProduto(${produto.id})">Editar</button>
        <button class="btn btn-sm btn-outline-danger" onclick="excluirProduto(${produto.id})">Excluir</button>
      </td>
    </tr>
  `).join("");
}

function editarProduto(id) {
  const produto = (window.__produtos || []).find((item) => item.id === id);
  if (!produto) return;
  document.getElementById("produtoId").value = produto.id;
  document.getElementById("nome").value = produto.nome;
  document.getElementById("categoria").value = produto.categoria;
  document.getElementById("preco").value = produto.preco;
  document.getElementById("img").value = produto.img;
  document.getElementById("desc").value = produto.desc;
  document.getElementById("tamanhos").value = produto.tamanhos.join(", ");
  window.scrollTo({ top: 0, behavior: "smooth" });
}

async function excluirProduto(id) {
  await fetch(`${PRODUTOS_API}/${id}`, { method: "DELETE" });
  await carregarProdutos();
}

async function carregarPedidos() {
  const resposta = await fetch(PEDIDOS_API);
  const pedidos = await resposta.json();
  window.__pedidos = pedidos;

  if (!pedidos.length) {
    listaPedidos.innerHTML = `<tr><td colspan="6" class="text-center text-secondary py-4">Nenhum pedido recebido ainda.</td></tr>`;
    return;
  }

  listaPedidos.innerHTML = pedidos.map((pedido) => `
    <tr>
      <td>
        <strong>#${pedido.id}</strong><br>
        <span class="text-secondary small">${formatarData(pedido.createdAt)}</span>
      </td>
      <td>
        <strong>${pedido.clienteNome}</strong><br>
        <span class="text-secondary small">${pedido.metodoPagamento} • ${pedido.cidade}</span>
      </td>
      <td>
        <select class="form-select form-select-sm" id="statusPagamento-${pedido.id}">
          ${["Aguardando pagamento", "Pago"].map((status) => `<option value="${status}" ${pedido.statusPagamento === status ? "selected" : ""}>${status}</option>`).join("")}
        </select>
      </td>
      <td>
        <select class="form-select form-select-sm" id="statusEntrega-${pedido.id}">
          ${["Pedido recebido", "Separando", "Enviado", "Entregue"].map((status) => `<option value="${status}" ${pedido.statusEntrega === status ? "selected" : ""}>${status}</option>`).join("")}
        </select>
      </td>
      <td>R$ ${formatarPreco(pedido.total)}</td>
      <td class="text-end"><button class="btn btn-sm btn-primary" onclick="salvarStatusPedido(${pedido.id})">Salvar status</button></td>
    </tr>
  `).join("");
}

async function salvarStatusPedido(id) {
  const statusPagamento = document.getElementById(`statusPagamento-${id}`).value;
  const statusEntrega = document.getElementById(`statusEntrega-${id}`).value;
  await fetch(`${PEDIDOS_API}/${id}/status`, {
    method: "PATCH",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ statusPagamento, statusEntrega })
  });
  await carregarPedidos();
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const id = document.getElementById("produtoId").value;
  await fetch(id ? `${PRODUTOS_API}/${id}` : PRODUTOS_API, {
    method: id ? "PUT" : "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(coletarProduto())
  });
  limparProduto();
  await carregarProdutos();
});

cancelarBtn.addEventListener("click", limparProduto);
document.getElementById("logoutBtn").addEventListener("click", () => {
  sessionStorage.removeItem("resenha_admin_auth");
  window.location.href = "login.html";
});

Promise.all([carregarProdutos(), carregarPedidos()]);
</script>
</body>
</html>
