<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Painel Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f5f5;
}

.card{
border-radius:12px;
}

img{
border-radius:10px;
}

</style>

</head>

<body>

<div class="container mt-5">

<h2 class="mb-4">Painel de Produtos</h2>

<!-- FORM -->
<div class="card p-4 mb-4">

<input id="nome" class="form-control mb-2" placeholder="Nome">

<input id="preco" type="number" class="form-control mb-2" placeholder="Preço">

<input id="img" type="file" class="form-control mb-2">

<img id="preview" class="mb-2" width="120" style="display:none;">

<button class="btn btn-success" onclick="salvar()">
Salvar Produto
</button>

</div>

<!-- LISTA -->
<div id="lista" class="row g-3"></div>

</div>

<script>

let editIndex = null

function carregar(){

let produtos = JSON.parse(localStorage.getItem("produtos")) || []

let lista = document.getElementById("lista")
lista.innerHTML=""

produtos.forEach((p,i)=>{

lista.innerHTML += `

<div class="col-md-3">
<div class="card p-2 text-center">

<img src="${p.img}" height="150" style="object-fit:cover">

<h6 class="mt-2">${p.nome}</h6>
<p class="text-primary">R$ ${p.preco}</p>

<button class="btn btn-warning btn-sm mb-1" onclick="editar(${i})">
Editar
</button>

<button class="btn btn-danger btn-sm" onclick="excluir(${i})">
Excluir
</button>

</div>
</div>

`

})

}

function salvar(){

let nome = document.getElementById("nome").value
let preco = document.getElementById("preco").value
let file = document.getElementById("img").files[0]

let produtos = JSON.parse(localStorage.getItem("produtos")) || []

if(editIndex !== null){

produtos[editIndex].nome = nome
produtos[editIndex].preco = preco

localStorage.setItem("produtos", JSON.stringify(produtos))

editIndex = null
alert("Produto atualizado!")

carregar()
return
}

if(!file){
alert("Escolha uma imagem")
return
}

let reader = new FileReader()

reader.onload = function(e){

let imagemBase64 = e.target.result

produtos.push({
nome,
preco,
img: imagemBase64
})

localStorage.setItem("produtos", JSON.stringify(produtos))

alert("Produto cadastrado!")

document.getElementById("nome").value=""
document.getElementById("preco").value=""
document.getElementById("img").value=""
document.getElementById("preview").style.display="none"

carregar()

}

reader.readAsDataURL(file)

}

function editar(i){

let produtos = JSON.parse(localStorage.getItem("produtos")) || []

document.getElementById("nome").value = produtos[i].nome
document.getElementById("preco").value = produtos[i].preco

editIndex = i

}

function excluir(i){

let produtos = JSON.parse(localStorage.getItem("produtos")) || []

produtos.splice(i,1)

localStorage.setItem("produtos", JSON.stringify(produtos))

carregar()

}

document.getElementById("img").addEventListener("change", function(){

let file = this.files[0]

if(file){

let reader = new FileReader()

reader.onload = function(e){
let preview = document.getElementById("preview")
preview.src = e.target.result
preview.style.display="block"
}

reader.readAsDataURL(file)

}

})

carregar()

</script>

</body>
</html>
