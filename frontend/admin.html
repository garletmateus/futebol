<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin | Resenha Sports</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
:root{--primary:#0d7a5f;--primary-dark:#085542;--ink:#11211b;--line:#d7e2dd}body{background:#eef3f1;font-family:"DM Sans",sans-serif}.shell{max-width:1180px}.card{border:none;border-radius:24px;box-shadow:0 16px 34px rgba(17,33,27,.08)}.thumb{width:64px;height:64px;border-radius:16px;object-fit:cover;background:#e8eeeb}.btn-primary{background:var(--primary);border-color:var(--primary)}.btn-primary:hover{background:var(--primary-dark);border-color:var(--primary-dark)}
</style>
</head>
<body>
<div class="container py-5 shell">
  <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
    <div><p class="text-secondary mb-1">Area restrita</p><h1 class="h2 mb-0" style="font-family:'Barlow',sans-serif;color:var(--ink)">Painel administrativo</h1></div>
    <div class="d-flex gap-2"><a href="index.html" class="btn btn-outline-dark">Ver loja</a><button id="logoutBtn" class="btn btn-dark">Sair</button></div>
  </div>
  <div class="card p-4 mb-4">
    <form id="produtoForm" class="row g-3">
      <input type="hidden" id="produtoId">
      <div class="col-md-6"><label class="form-label fw-semibold">Nome</label><input id="nome" class="form-control" required></div>
      <div class="col-md-3"><label class="form-label fw-semibold">Categoria</label><input id="categoria" class="form-control" required></div>
      <div class="col-md-3"><label class="form-label fw-semibold">Preco</label><input id="preco" type="number" class="form-control" required></div>
      <div class="col-12"><label class="form-label fw-semibold">Imagem</label><input id="img" class="form-control" placeholder="./image/corinthianss.webp" required></div>
      <div class="col-12"><label class="form-label fw-semibold">Descricao</label><textarea id="desc" class="form-control" rows="3" required></textarea></div>
      <div class="col-12"><label class="form-label fw-semibold">Tamanhos</label><input id="tamanhos" class="form-control" placeholder="P, M, G, GG" required></div>
      <div class="col-12 d-flex gap-2"><button class="btn btn-primary" type="submit">Salvar produto</button><button class="btn btn-outline-secondary" type="button" id="cancelarBtn">Cancelar</button></div>
    </form>
  </div>
  <div class="card p-4"><div class="table-responsive"><table class="table align-middle mb-0"><thead><tr><th>Produto</th><th>Categoria</th><th>Preco</th><th>Tamanhos</th><th class="text-end">Acoes</th></tr></thead><tbody id="lista"></tbody></table></div></div>
</div>
<script>
if(sessionStorage.getItem("resenha_admin_auth")!=="ok"){window.location.href="login.html"}
const API_URL="/api/produtos";const form=document.getElementById("produtoForm"),lista=document.getElementById("lista"),cancelarBtn=document.getElementById("cancelarBtn");function limpar(){form.reset();document.getElementById("produtoId").value=""}function coletar(){return{nome:document.getElementById("nome").value.trim(),categoria:document.getElementById("categoria").value.trim(),preco:Number(document.getElementById("preco").value),img:document.getElementById("img").value.trim(),desc:document.getElementById("desc").value.trim(),tamanhos:document.getElementById("tamanhos").value.split(",").map(i=>i.trim()).filter(Boolean)}}async function carregar(){const resposta=await fetch(API_URL);const produtos=await resposta.json();window.__produtos=produtos;lista.innerHTML=produtos.map(produto=>`<tr><td><div class="d-flex align-items-center gap-3"><img src="${produto.img}" class="thumb" alt="${produto.nome}"><div><strong>${produto.nome}</strong><br><span class="text-secondary small">${produto.desc}</span></div></div></td><td>${produto.categoria}</td><td>R$ ${Number(produto.preco).toFixed(0)},00</td><td>${produto.tamanhos.join(", ")}</td><td class="text-end"><button class="btn btn-sm btn-outline-primary" onclick="editarProduto(${produto.id})">Editar</button> <button class="btn btn-sm btn-outline-danger" onclick="excluirProduto(${produto.id})">Excluir</button></td></tr>`).join("")}function editarProduto(id){const produto=(window.__produtos||[]).find(item=>item.id===id);if(!produto)return;document.getElementById("produtoId").value=produto.id;document.getElementById("nome").value=produto.nome;document.getElementById("categoria").value=produto.categoria;document.getElementById("preco").value=produto.preco;document.getElementById("img").value=produto.img;document.getElementById("desc").value=produto.desc;document.getElementById("tamanhos").value=produto.tamanhos.join(", ");window.scrollTo({top:0,behavior:"smooth"})}async function excluirProduto(id){await fetch(`${API_URL}/${id}`,{method:"DELETE"});await carregar()}form.addEventListener("submit",async e=>{e.preventDefault();const id=document.getElementById("produtoId").value;await fetch(id?`${API_URL}/${id}`:API_URL,{method:id?"PUT":"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(coletar())});limpar();await carregar()});cancelarBtn.addEventListener("click",limpar);document.getElementById("logoutBtn").addEventListener("click",()=>{sessionStorage.removeItem("resenha_admin_auth");window.location.href="login.html"});carregar();
</script>
</body>
</html>
