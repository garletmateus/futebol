<!DOCTYPE html>
<html>

<head>

<title>Painel Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>Painel de Produtos</h2>

<input id="nome" class="form-control mt-3" placeholder="Nome">

<input id="preco" class="form-control mt-2" placeholder="Preço">

<input id="img" class="form-control mt-2" placeholder="Imagem ex: flamengo.jpg">

<button class="btn btn-success mt-3" onclick="salvar()">

Cadastrar Produto

</button>

</div>

<script>

function salvar(){

let nome=document.getElementById("nome").value
let preco=document.getElementById("preco").value
let img=document.getElementById("img").value

let produtos=JSON.parse(localStorage.getItem("produtos")) || []

produtos.push({

nome,
preco,
img

})

localStorage.setItem("produtos",JSON.stringify(produtos))

alert("Produto cadastrado")

}

</script>

</body>
</html>
